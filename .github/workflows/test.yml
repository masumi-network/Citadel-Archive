name: Test

# Runs the test suite + lint on every PR and push. A merge to main auto-deploys
# to the Railway node, so this is the gate between a bad merge and production.

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        # --all-extras pulls in the `server` optional-dependency group
        # (fastapi, mcp, cognee, …); the test suite imports kb.server and the
        # MCP module, so a base-only sync fails collection with ModuleNotFound.
        run: uv sync --all-extras --dev
      - name: Lint
        run: uv run ruff check .
      - name: Dependency audit
        run: uv run pip-audit --cache-dir .pip-audit-cache
      - name: Run tests
        run: uv run pytest tests/ -q
